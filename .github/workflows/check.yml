name: 链接体检

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # 每周一
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 check.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
